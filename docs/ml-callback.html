<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mercado Livre conectado</title>
  <style>
    :root {
      color-scheme: light;
      --yellow: #ffe600;
      --text: #172033;
      --muted: #64748b;
      --border: #e5ebf2;
      --bg: #f6f8fb;
      --card: #ffffff;
      --green: #0f8f45;
      --red: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    main {
      width: min(100%, 520px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, .08);
      padding: 28px;
    }

    .logo {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--yellow);
      display: grid;
      place-items: center;
      margin-bottom: 18px;
      font-weight: 900;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #ecfdf5;
      color: var(--green);
      font-weight: 800;
    }

    .status.error {
      background: #fef2f2;
      color: var(--red);
    }

    label {
      display: block;
      margin: 18px 0 7px;
      color: var(--text);
      font-weight: 850;
      font-size: 13px;
    }

    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0 12px;
      color: var(--text);
      font: inherit;
      background: #fff;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button, a.button {
      min-height: 44px;
      border: 0;
      border-radius: 9px;
      background: var(--yellow);
      color: #111827;
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    button.secondary, a.secondary {
      background: #f1f5f9;
      color: #334155;
    }

    .hint {
      display: block;
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 520px) {
      main { padding: 22px; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="logo">ML</div>
    <h1>Autorização recebida</h1>
    <p>Copie o código abaixo e cole no aplicativo para concluir a conexão com o Mercado Livre.</p>

    <div class="status" id="statusBox">Código encontrado na URL.</div>

    <label for="codeInput">Código de autorização</label>
    <input id="codeInput" readonly>

    <label for="stateInput">State</label>
    <input id="stateInput" readonly>

    <div class="actions">
      <button type="button" id="copyCodeButton">Copiar código</button>
      <a class="button secondary" id="openAppButton" href="#">Abrir no app</a>
    </div>

    <small class="hint">
      Esta página não troca o código por token e não armazena dados. A troca segura deve acontecer dentro do aplicativo.
    </small>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || '';
    const state = params.get('state') || '';
    const error = params.get('error') || '';

    const statusBox = document.querySelector('#statusBox');
    const codeInput = document.querySelector('#codeInput');
    const stateInput = document.querySelector('#stateInput');
    const copyButton = document.querySelector('#copyCodeButton');
    const openAppButton = document.querySelector('#openAppButton');

    codeInput.value = code;
    stateInput.value = state;

    if (error || !code) {
      statusBox.classList.add('error');
      statusBox.textContent = error
        ? `Mercado Livre retornou um erro: ${error}`
        : 'Nenhum código foi encontrado na URL.';
      copyButton.disabled = true;
      openAppButton.removeAttribute('href');
    } else {
      const deepLink = new URL('mercedania://ml-oauth');
      deepLink.searchParams.set('code', code);
      if (state) deepLink.searchParams.set('state', state);
      openAppButton.href = deepLink.toString();
    }

    copyButton.addEventListener('click', async () => {
      if (!code) return;
      await navigator.clipboard.writeText(code);
      copyButton.textContent = 'Código copiado';
      window.setTimeout(() => { copyButton.textContent = 'Copiar código'; }, 1800);
    });
  </script>
</body>
</html>
