<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Mercedania</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><div class="brand-icon"><i class="fa-solid fa-diamond"></i></div><h1>MERCEDANIA</h1><p>Painel de Controle</p></div>
      <nav class="menu">
        <button class="menu-item active"><i class="fa-solid fa-house"></i> <span>Dashboard</span></button><button class="menu-item"><i class="fa-solid fa-rectangle-ad"></i> <span>Anúncios</span></button><button class="menu-item"><i class="fa-solid fa-box-open"></i> <span>Produtos</span></button><button class="menu-item"><i class="fa-solid fa-cart-shopping"></i> <span>Vendas</span></button><button class="menu-item"><i class="fa-solid fa-tags"></i> <span>Promoções</span></button><button class="menu-item"><i class="fa-solid fa-rotate-left"></i> <span>Devoluções</span></button><button class="menu-item"><i class="fa-solid fa-calculator"></i> <span>Simulador</span></button><button class="menu-item"><i class="fa-solid fa-chart-simple"></i> <span>Relatórios</span></button><button class="menu-item"><i class="fa-solid fa-gear"></i> <span>Configurações</span></button>
      </nav>
      <div class="sidebar-footer"><div class="theme-pill"><span><i class="fa-solid fa-moon"></i> Modo Escuro</span><span class="toggle"></span></div><div class="sync-time"><p>Última atualização</p><strong>31/05/2024 18:42</strong></div></div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div><h2>Dashboard</h2><p>Visão geral do seu negócio</p></div>
        <div class="search"><span><i class="fa-solid fa-magnifying-glass"></i></span><input id="searchInput" type="text" placeholder="Pesquisar produtos, SKUs, anúncios, pedidos..." /><kbd>Ctrl + K</kbd></div>
        <div class="actions"><button id="syncBtn" class="btn"><i class="fa-solid fa-rotate"></i> Sincronizar dados</button><button class="icon-btn"><i class="fa-solid fa-bell"></i></button></div>
      </header>
      <section class="hero-cards" id="heroCards"></section>
      <section class="other-panel reveal"><h3>Outros indicadores</h3><div class="small-cards" id="smallCards"></div></section>
      <section class="promotions panel reveal"><div class="section-title"><h3>Promoções</h3><button class="ghost-btn">Ver todas promoções ›</button></div><div class="promo-grid" id="promoGrid"></div></section>
      <section class="dashboard-grid">
        <article class="panel chart-card reveal"><div class="section-title"><h3>Receita <span>Últimos 12 meses</span></h3><button class="mini-select">Mensal <i class="fa-solid fa-chevron-down"></i></button></div><div class="line-chart"><svg viewBox="0 0 700 300" preserveAspectRatio="none"><defs><linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(255,255,255,.22)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/></linearGradient></defs><path class="grid-line" d="M0 50 H700 M0 110 H700 M0 170 H700 M0 230 H700"/><path class="area" d="M0 230 L60 205 L120 130 L180 145 L240 82 L300 140 L360 55 L420 125 L480 215 L540 170 L600 160 L670 70 L700 35 L700 300 L0 300 Z"/><path class="line" d="M0 230 L60 205 L120 130 L180 145 L240 82 L300 140 L360 55 L420 125 L480 215 L540 170 L600 160 L670 70 L700 35"/></svg><div class="months"><span>Jun</span><span>Jul</span><span>Ago</span><span>Set</span><span>Out</span><span>Nov</span><span>Dez</span><span>Jan</span><span>Fev</span><span>Mar</span><span>Abr</span><span>Mai</span></div></div></article>
        <article class="panel reveal cities"><h3><i class="fa-solid fa-location-dot"></i> Cidades com mais vendas</h3><div id="citiesList" class="cities-list"></div><button class="wide-btn">Ver todas cidades</button></article>
        <article class="panel reveal bars"><h3>♙ Receita por mês</h3><div id="barChart" class="bar-chart"></div><button class="wide-btn">Ver relatório completo ›</button></article>
        <article class="panel reveal latest"><div class="section-title"><h3><i class="fa-solid fa-cart-shopping"></i> Últimas 3 vendas</h3><button class="text-btn">Ver todas</button></div><div id="latestSales" class="sales-list"></div><button class="wide-btn">Ver todas vendas</button></article>
      </section>
    </main>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
